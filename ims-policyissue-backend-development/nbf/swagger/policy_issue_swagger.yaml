              type: integer
              description: Age when proposal was indexed
            age_at_payment:
              type: integer
              description: Current age at payment
            age_change_date:
              type: string
              format: date
              description: Date when age changed (birthday between indexing and payment)
        premium_adjustment:
          type: object
          description: Short/excess premium details if age changed (BR-POL-007)
          properties:
            adjustment_type:
              type: string
              enum: [NONE, SHORT_PREMIUM, EXCESS_PREMIUM]
              description: Type of adjustment required
            original_premium:
              type: number
              description: Premium calculated at indexing
            revised_premium:
              type: number
              description: Premium recalculated at current age
            premium_difference:
              type: number
              description: Difference amount (positive = short, negative = excess)
            short_premium_due:
              type: number
              description: Additional premium to collect (if short)
            excess_premium_credit:
              type: number
              description: Excess amount credited to next premium (if excess)
            excess_adjustment_type:
              type: string
              enum: [CREDIT_TO_NEXT_PREMIUM, REFUND_REQUESTED]
              description: How excess premium was handled
            suspense_reference:
              type: string
