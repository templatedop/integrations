  # POLICY LIFECYCLE APIs (3 APIs)
  # ============================================

  /policies/{policy_id}:
    get:
      tags:
        - Policy
      operationId: getPolicy
      summary: Get policy details
      description: |
        Retrieves complete policy details by ID.

        **User Journeys**: UJ-POL-007, UJ-POL-009

        **Functional Requirements**: FR-POL-025
      parameters:
        - name: policy_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Policy details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /policies/{policy_id}/flc-cancel:
    post:
      tags:
        - Policy
      operationId: cancelPolicyFLC
      summary: Cancel policy during free look period
      description: |
        Processes free look cancellation within FLC period.

        **API ID**: POL-API-022

        **User Journeys**: UJ-POL-009

        **Functional Requirements**: FR-POL-027

        **Business Rules**:
        - BR-POL-009: FLC Refund Calculation
          - Deduct proportionate risk premium (days of coverage)
          - Deduct stamp duty
          - Deduct medical fee (if applicable)
        - BR-POL-021: Free Look Period Duration (15-30 days based on channel)
        - BR-POL-028: FLC Start Date Determination

        **Validation Rules**:
        - VR-PI-024: Within free look period

        **Error Codes**:
        - ERR-POL-053: Free look period expired

        **Integration Points**:
        - INT-POL-011: Collections Service (refund)
        - INT-POL-014: Agent Service (commission clawback)
        - INT-POL-012: Accounting Service (GL reversal)

        **Temporal Workflow**: Sends SignalFLCCancelRequest

        **Events Published**: policy.flc_cancelled
      parameters:
        - name: policy_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FLCCancelRequest'
      responses:
        '200':
          description: FLC cancellation processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FLCCancelResponse'
        '400':
          description: FLC period expired or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                flcExpired:
                  $ref: '#/components/examples/ERR-POL-053'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /policies/{policy_id}/flc-status:
    get:
      tags:
        - Policy
      operationId: getFLCStatus
      summary: Get free look period status
      description: |
        Retrieves current free look period status for a policy.

        **API ID**: STATUS-POL-004

        **User Journeys**: UJ-POL-009

        **Business Rules**:
        - BR-POL-021: FLC period duration
        - BR-POL-028: FLC start date determination

        **Response includes**:
        - FLC start date
        - FLC end date
        - Days remaining
        - Eligibility status
      parameters:
        - name: policy_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: FLC status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FLCStatusResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

