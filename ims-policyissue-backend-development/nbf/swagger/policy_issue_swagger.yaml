              type: string
              description: Postal/courier tracking number
            delivery_address:
              type: string
              description: Address where policy was delivered
        aea_dates:
          type: object
          description: Automatic Endorsement of Age dates (applicable when age proof verification is pending)
          properties:
            aea_due_date:
              type: string
              format: date
              description: Due date for Automatic Endorsement of Age verification
            aea_completed_date:
              type: string
              format: date
              description: Date when AEA verification was completed
            aea_status:
              type: string
              enum: [PENDING, COMPLETED, NOT_APPLICABLE]
              description: Status of AEA process
        flc_status:
          type: object
          additionalProperties: true

