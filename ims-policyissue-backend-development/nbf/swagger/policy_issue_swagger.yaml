          type: object
          required:
            - account_number
            - ifsc_code
            - account_holder_name
          properties:
            account_number:
              type: string
            ifsc_code:
              type: string
              pattern: '^[A-Z]{4}0[A-Z0-9]{6}$'
            account_holder_name:
              type: string

    FLCCancelResponse:
      type: object
      properties:
        policy_id:
          type: integer
          format: int64
          description: Unique policy identifier (bigint)
        policy_number:
          type: string
        customer_id:
          type: integer
          format: int64
          description: Customer ID linked to this policy
        previous_status:
          type: string
        new_status:
          type: string
          enum: [FLC_CANCELLED]
        cancellation:
          type: object
          properties:
            cancellation_date:
              type: string
              format: date
            reason:
              type: string
            processed_by:
              type: integer
              format: int64
              description: User ID who processed cancellation
        flc_period:
          type: object
          properties:
            start_date:
              type: string
              format: date
              description: FLC start date (delivery_date)
            end_date:
              type: string
              format: date
            days_remaining:
              type: integer
            within_period:
              type: boolean
        delivery_date:
          type: string
          format: date
          description: Date when policy kit was delivered - used as FLC start date
        refund_calculation:
          type: object
          properties:
            premium_paid:
              type: number
            deductions:
              type: object
              properties:
                proportionate_risk_premium:
                  type: object
                  properties:
                    days_of_coverage:
                      type: integer
                    daily_rate:
                      type: number
                    amount:
                      type: number
                stamp_duty:
                  type: number
                medical_fee:
                  type: number
                gst_not_refundable:
                  type: number
            total_deductions:
              type: number
            net_refund_amount:
              type: number
        refund:
          type: object
          properties:
            refund_id:
              type: string
            amount:
              type: number
            status:
              type: string
              enum: [INITIATED, PROCESSING, COMPLETED]
            estimated_processing_days:
              type: integer
            bank_account:
              type: object
              properties:
                masked_account:
                  type: string
                bank_name:
                  type: string
        commission_clawback:
          type: object
          properties:
            initiated:
              type: boolean
            agent_id:
              type: string
            clawback_amount:
              type: number
        receipt:
          type: object
          properties:
            document_id:
              type: string
            download_url:
              type: string
        workflow_state:
          $ref: '#/components/schemas/WorkflowState'
        notifications_sent:
          type: object
          properties:
            email:
              type: boolean
            sms:
              type: boolean

    FLCStatusResponse:
      type: object
      properties:
        policy_id:
          type: integer
          format: int64
          description: Unique policy identifier (bigint)
        policy_number:
          type: string
        customer_id:
          type: integer
          format: int64
          description: Customer ID linked to this policy
        flc_status:
          type: string
          enum: [NOT_STARTED, ACTIVE, EXPIRED, CANCELLED]
        delivery_date:
          type: string
          format: date
          description: Date when policy kit was delivered - triggers FLC start
        flc_period:
          type: object
          properties:
            start_date:
              type: string
              format: date
              description: FLC start date (equals delivery_date)
            end_date:
              type: string
              format: date
            total_days:
              type: integer
            days_elapsed:
              type: integer
            days_remaining:
              type: integer
        is_cancellation_allowed:
          type: boolean
        message:
          type: string

