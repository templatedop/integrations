        cgst:
          type: number
        sgst:
          type: number
        igst:
          type: number
        total_gst:
          type: number
        stamp_duty:
          type: number
        medical_fee:
          type: number
        total_first_payment:
          type: number
        modal_premium:
          type: number

    MaturityCalculationRequest:
      type: object
      required:
        - product_code
        - sum_assured
