          type: string
        provider_state:
          type: string
          default: "Maharashtra"

    GSTCalculationResponse:
      type: object
      properties:
        base_amount:
          type: number
        gst_rate:
          type: number
        cgst:
          type: number
        sgst:
          type: number
        igst:
          type: number
        total_gst:
          type: number
        gst_type:
          type: string
          enum: [INTRASTATE, INTERSTATE]

    # ============================================
    # DOCUMENT SCHEMAS
    # ============================================

    DocumentChecklistResponse:
      type: object
      properties:
        proposal_id:
          type: integer
          format: int64
          description: Proposal ID (bigint)
        required_documents:
          type: array
          items:
            type: object
            properties:
              document_type:
                type: string
                description: DDL document_type_enum value
              sub_type:
                type: string
                description: "Optional qualifier for duplicate types (e.g. PROPOSER_PHOTO_ID, PROPOSER_ADDRESS_PROOF)"
              is_mandatory:
                type: boolean
              is_uploaded:
                type: boolean
              document_id:
                type: string
              upload_date:
                type: string
                format: date-time
              reason_required:
                type: string
        completion_percentage:
          type: integer

    DocumentUploadRequest:
      type: object
      required:
        - document_type
        - file_name
        - mime_type
        - file_size
        - document_date
        - uploaded_by
      properties:
        document_type:
          type: string
          description: Type of document being uploaded
          enum:
            - PROPOSAL_FORM
            - DOB_PROOF
            - ADDRESS_PROOF
            - PHOTO_ID
            - MEDICAL_REPORT
            - PAYMENT_COPY
            - HEALTH_DECLARATION
            - PHOTO
            - INCOME_PROOF
            - EMPLOYMENT_PROOF
            - OTHER
        file_name:
          type: string
          description: Original file name
        mime_type:
          type: string
          description: "File MIME type (VR-PI-021)"
          enum:
            - application/pdf
            - image/jpeg
            - image/png
            - image/jpg
        file_size:
          type: integer
          format: int64
          description: "File size in bytes (VR-PI-022: max 5 MB)"
          minimum: 1
        document_date:
          type: string
          format: date
          description: "Date on the document (VR-PI-023: must not be in the future). Format: YYYY-MM-DD"
        comments:
          type: string
          description: Optional comments about the document
        uploaded_by:
          type: integer
          format: int64
          description: User ID of the uploader

    DocumentMissingNotation:
      type: object
      description: Notation for missing documents at QC/Approval stage
      required:
        - document_type
        - stage
      properties:
        missing_doc_id:
          type: integer
          format: int64
          description: Unique ID for the missing document record
        proposal_id:
          type: integer
          format: int64
          description: Proposal ID
        document_type:
          type: string
          enum: [PROPOSAL_FORM, DOB_PROOF, ADDRESS_PROOF, PHOTO_ID, MEDICAL_REPORT, PAYMENT_COPY, HEALTH_DECLARATION, PHOTO, INCOME_PROOF, EMPLOYMENT_PROOF, OTHER]
          description: Type of document marked as missing
        document_description:
          type: string
          description: Additional description of the missing document
        reason_missing:
          type: string
          description: Reason why document is missing (e.g., customer not available, pending from authority)
        stage:
          type: string
          enum: [QC_REVIEW, APPROVAL]
          description: Stage at which document was marked missing
        noted_by:
          type: integer
          format: int64
          description: User ID (QC or Approver) who noted the missing document
        noted_at:
          type: string
          format: date-time
          description: Timestamp when missing document was noted
        notes:
          type: string
          description: Additional notes about the missing document
        status:
          type: string
          enum: [PENDING, UPLOADED, WAIVED]
          default: PENDING
          description: Current status of the missing document
        resolved_by:
          type: integer
          format: int64
          description: User ID who resolved the missing document
        resolved_at:
          type: string
          format: date-time
          description: Timestamp when document was uploaded/resolved
        resolution_notes:
          type: string
          description: Notes about the resolution
        uploaded_document_id:
          type: integer
          format: int64
          description: Reference to uploaded document when resolved
        waived:
          type: boolean
          default: false
          description: Whether the document requirement was waived
        waived_by:
          type: integer
          format: int64
          description: User ID who waived the document
        waived_at:
          type: string
          format: date-time
          description: Timestamp when document was waived
        waiver_reason:
          type: string
          description: Reason for waiving the document requirement
        follow_up_required:
          type: boolean
          default: true
          description: Whether follow-up is required to obtain the document

    MissingDocumentsListResponse:
      type: object
      description: Response for getting list of missing documents for a proposal
      properties:
        proposal_id:
          type: integer
          format: int64
        proposal_number:
          type: string
        total_missing:
          type: integer
        pending_count:
          type: integer
        uploaded_count:
          type: integer
        waived_count:
          type: integer
        missing_documents:
          type: array
          items:
            $ref: '#/components/schemas/DocumentMissingNotation'

    MissingDocumentCreateRequest:
      type: object
      required:
        - document_type
        - stage
        - noted_by
      properties:
        document_type:
          type: string
          enum: [PROPOSAL_FORM, DOB_PROOF, ADDRESS_PROOF, PHOTO_ID, MEDICAL_REPORT, PAYMENT_COPY, HEALTH_DECLARATION, PHOTO, INCOME_PROOF, EMPLOYMENT_PROOF, OTHER]
        document_description:
          type: string
        reason_missing:
          type: string
        stage:
          type: string
          enum: [QC_REVIEW, APPROVAL]
        notes:
          type: string
        noted_by:
          type: integer
          format: int64
          description: User ID who noted the missing document
        follow_up_required:
          type: boolean
          default: true

    MissingDocumentResolveRequest:
      type: object
      required:
        - status
        - resolved_by
      properties:
        status:
          type: string
          enum: [UPLOADED, WAIVED]
        uploaded_document_id:
          type: integer
          format: int64
          description: Required if status is UPLOADED
        waiver_reason:
          type: string
          description: Required if status is WAIVED
        resolution_notes:
          type: string
        resolved_by:
          type: integer
          format: int64
          description: User ID who resolved the missing document

    DocumentUploadResponse:
      type: object
      properties:
        document_ref_id:
          type: integer
          format: int64
          description: Document reference ID (bigint)
        document_id:
          type: string
          description: DMS document ID
        document_type:
          type: string
        file_name:
          type: string
        uploaded_at:
          type: string
          format: date-time
        download_url:
          type: string
        is_missing_notation:
          type: boolean
          default: false
          description: Indicates if this is a missing document notation rather than actual upload

    # ============================================
    # STATUS SCHEMAS
    # ============================================

    ProposalStatusResponse:
      type: object
      properties:
        proposal_id:
          type: integer
          format: int64
        proposal_number:
          type: string
        status:
          type: string
        status_description:
          type: string
        last_updated:
          type: string
          format: date-time

    ProposalTimelineResponse:
      type: object
      properties:
        proposal_id:
          type: integer
          format: int64
        proposal_number:
          type: string
        timeline:
          type: array
          items:
            type: object
            properties:
              step:
                type: string
              status:
                type: string
                enum: [COMPLETED, CURRENT, PENDING, SKIPPED]
              from_status:
                type: string
              to_status:
                type: string
              timestamp:
                type: string
                format: date-time
              actor:
                type: string
              comments:
                type: string
              duration:
                type: string

    PolicyStatusResponse:
      type: object
      properties:
        policy_id:
          type: integer
          format: int64
        policy_number:
          type: string
        status:
          type: string
        status_description:
          type: string
        effective_date:
          type: string
          format: date
        last_updated:
          type: string
          format: date-time

    # ============================================
    # WORKFLOW SCHEMAS
    # ============================================

    WorkflowStateResponse:
      type: object
      properties:
        workflow_id:
          type: string
        workflow_type:
          type: string
          enum:
            - PolicyIssuanceWorkflow
            - InstantIssuanceWorkflow
            - BulkProposalUploadWorkflow
        status:
          type: string
          enum: [RUNNING, COMPLETED, FAILED, TERMINATED]
        current_step:
          type: string
        progress:
          type: object
          properties:
            completed_steps:
              type: integer
            total_steps:
              type: integer
            percentage:
              type: integer
        pending_signals:
          type: array
          items:
            type: string
        start_time:
          type: string
          format: date-time
        last_activity:
          type: string
          format: date-time

    # ============================================
    # BULK UPLOAD SCHEMAS
    # ============================================

    BulkUploadResponse:
      type: object
      properties:
        batch_id:
          type: integer
          format: int64
        file_name:
          type: string
        status:
          type: string
          enum: [ACCEPTED, PROCESSING]
        workflow_id:
          type: string
        estimated_completion:
          type: string
          format: date-time

    BulkUploadStatusResponse:
      type: object
      properties:
        batch_id:
          type: integer
          format: int64
        file_name:
          type: string
        status:
          type: string
          enum: [PROCESSING, COMPLETED, FAILED]
        total_rows:
          type: integer
        success_count:
          type: integer
        failure_count:
          type: integer
        proposal_numbers:
          type: array
          items:
            type: string
        error_report:
          type: object
          properties:
            document_id:
              type: string
            download_url:
              type: string
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time

    # ============================================
    # COMMON SCHEMAS
    # ============================================

    WorkflowState:
      type: object
      properties:
        current_step:
          type: string
        next_step:
          type: string
        is_terminal:
          type: boolean
        allowed_actions:
          type: array
          items:
            type: string
        sla_status:
          type: string
          enum: [ON_TRACK, AT_RISK, BREACHED]
        time_remaining:
          type: string
        approval_routing:
          type: object
          description: Approval routing configuration for the proposal
          properties:
            required_approval_level:
              type: integer
              enum: [1, 2, 3]
              description: Required approver level based on SA (L1: ≤5L, L2: 5-10L, L3: >10L)
            qc_required:
              type: boolean
              default: true
              description: Whether QC review is required
            qc_skip_reason:
              type: string
              description: Reason if QC is skipped (e.g., AUTO_APPROVED_KYC, INSTANT_ISSUANCE)
            approval_skip_eligible:
              type: boolean
              default: false
              description: Whether proposal is eligible for approval skip (instant issuance)
            auto_approval_criteria:
              type: object
              description: Criteria for auto-approval if eligible
              properties:
                kyc_verified:
                  type: boolean
                aadhaar_authenticated:
                  type: boolean
                non_medical:
                  type: boolean
                within_auto_approval_sa_limit:
                  type: boolean
                all_criteria_met:
                  type: boolean

    ApprovalRoutingConfig:
      type: object
      description: Configuration for approval routing and QC skip rules
      properties:
        sa_min:
          type: number
        sa_max:
          type: number
        approver_level:
          type: integer
          enum: [1, 2, 3]
        qc_skip_allowed:
          type: boolean
          default: false
        auto_approval_allowed:
          type: boolean
          default: false
        auto_approval_conditions:
          type: array
          items:
            type: string
            enum:
              - KYC_VERIFIED_AADHAAR
              - NON_MEDICAL
              - SA_BELOW_THRESHOLD
              - STANDARD_PRODUCT
              - NO_ADVERSE_HISTORY

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total_items:
          type: integer
        total_pages:
          type: integer
        has_next:
          type: boolean
        has_previous:
          type: boolean

  examples:
    ERR-POL-006:
      summary: Invalid Declaration Date
      value:
        error:
          code: "ERR-POL-006"
          category: "VALIDATION_ERROR"
          message: "Declaration date cannot be later than receipt date"
          field: "declaration_date"
          http_status: 400
          details:
            declaration_date: "2026-02-15"
            receipt_date: "2026-02-10"
            related_rules: ["VR-PI-004", "BR-POL-018"]
          resolution_steps:
            - "Verify declaration date is on or before the receipt date"
            - "Check date entry sequence: Declaration Date ≤ Receipt Date ≤ Indexing Date ≤ Proposal Date"
            - "Correct the declaration date or receipt date"

    ERR-POL-010:
      summary: Invalid Aadhaar Number
      value:
        error:
          code: "ERR-POL-010"
          category: "VALIDATION_ERROR"
          message: "Invalid Aadhaar number. Must be 12 digits"
          field: "aadhaar_number"
          http_status: 400
          details:
            provided_value: "12345678901"
            expected_format: "12 numeric digits"
            related_rules: ["VR-PI-008"]
          resolution_steps:
            - "Provide a valid 12-digit Aadhaar number"
            - "Verify Aadhaar number from customer's Aadhaar card"

    ERR-POL-011:
      summary: Invalid PAN Format
      value:
        error:
          code: "ERR-POL-011"
          category: "VALIDATION_ERROR"
          message: "Invalid PAN format. Must be 10 characters (5 letters, 4 digits, 1 letter)"
          field: "pan_number"
          http_status: 400
          details:
            provided_value: "ABCD12345"
            expected_format: "AAAAA9999A"
            related_rules: ["VR-PI-009"]
          resolution_steps:
            - "Provide PAN in format: ABCDE1234F"
            - "Ensure all letters are uppercase"

    ERR-POL-022:
      summary: Nominee Count Exceeded
      value:
        error:
          code: "ERR-POL-022"
          category: "VALIDATION_ERROR"
          message: "Maximum 3 nominees allowed per policy"
          field: "nominees"
          http_status: 400
          details:
            provided_count: 4
            max_allowed: 3
            related_rules: ["VR-PI-017", "BR-PI-036"]
          resolution_steps:
            - "Remove excess nominees to have maximum 3 nominees"
            - "Distribute nominee share percentages among 3 or fewer nominees"

    ERR-POL-023:
      summary: Nominee Share Invalid
      value:
        error:
          code: "ERR-POL-023"
          category: "VALIDATION_ERROR"
          message: "Total nominee share percentage must equal exactly 100%"
          field: "nominees.share_percentage"
          http_status: 400
          details:
            total_percentage: 90
            expected: 100
            related_rules: ["VR-PI-018", "VAL-POL-003"]
          resolution_steps:
            - "Adjust nominee share percentages to total exactly 100%"
            - "Example: Nominee 1: 50%, Nominee 2: 30%, Nominee 3: 20%"

    ERR-POL-031:
      summary: Age Not Eligible
      value:
        error:
          code: "ERR-POL-031"
          category: "BUSINESS_RULE_ERROR"
          message: "Age 60 years is not eligible for product 'Suraksha'. Age must be between 19 and 55 years"
          field: "date_of_birth"
          http_status: 400
          details:
            calculated_age: 60
            min_age: 19
            max_age: 55
            product_code: "PLI_WLA"
            related_rules: ["VR-PI-012", "BR-POL-011"]
          resolution_steps:
            - "Verify customer date of birth is correct"
            - "Select a product that matches customer's age criteria"

    ERR-POL-033:
      summary: Sum Assured Outside Range
      value:
        error:
          code: "ERR-POL-033"
          category: "BUSINESS_RULE_ERROR"
          message: "Sum assured Rs. 15000 is outside allowed range. Must be between Rs. 20000 and Rs. 10000000"
          field: "sum_assured"
          http_status: 400
          details:
            provided_value: 15000
            min_sa: 20000
            max_sa: 10000000
            product_code: "PLI_WLA"
            related_rules: ["VR-PI-013", "VAL-POL-002"]
          resolution_steps:
            - "Adjust sum assured to be within product limits"
            - "Minimum SA: Rs. 20,000"
            - "Sum assured should be in multiples of Rs. 5,000"

    ERR-POL-049:
      summary: Incorrect Approver Level
      value:
        error:
          code: "ERR-POL-049"
          category: "BUSINESS_RULE_ERROR"
          message: "Your approval authority level 1 does not match the required level 2 for sum assured Rs. 800000"
          http_status: 403
          details:
            current_level: 1
            required_level: 2
            sum_assured: 800000
            related_rules: ["BR-POL-016"]
          resolution_steps:
            - "Route proposal to appropriate approver level"
            - "Level 1: SA ≤ Rs. 5,00,000"
            - "Level 2: SA ≤ Rs. 10,00,000"
            - "Level 3: SA > Rs. 10,00,000"

    ERR-POL-053:
      summary: Free Look Period Expired
      value:
        error:
          code: "ERR-POL-053"
          category: "BUSINESS_RULE_ERROR"
          message: "Free look period has expired. Cancellation not allowed"
          http_status: 400
          details:
            flc_start_date: "2026-02-12"
            flc_end_date: "2026-03-14"
            current_date: "2026-03-20"
            days_expired: 6
            related_rules: ["BR-POL-021", "VR-PI-024"]
          resolution_steps:
            - "Free look cancellation only allowed within free look period"
            - "After free look period, surrender process applies"
            - "Contact branch for surrender options"

    InstantIssuanceSuccess:
      summary: Instant Issuance Success
      value:
        proposal_id: "prop_uuid_instant_001"
        proposal_number: "PLI-MH-2026-00056790"
        issuance_type: "INSTANT"
        policy:
          policy_id: "pol_uuid_001"
          policy_number: "PLI-MH-2026-P-00012345"
          status: "ISSUED"
          issue_date: "2026-02-12"
          commencement_date: "2026-02-12"
        bond:
          document_id: "doc_uuid_bond_001"
          download_url: "/api/v1/documents/doc_uuid_bond_001/download"
          sent_via: ["EMAIL", "WHATSAPP"]
        payment:
          payment_id: "pay_uuid_instant_001"
          status: "SUCCESS"
          receipt_number: "RCP-MH001-2026-00012346"
        free_look_period:
          start_date: "2026-02-12"
          end_date: "2026-03-14"
          days: 30
        workflow_state:
          current_step: "issued"
          next_step: "free_look_active"
          allowed_actions: ["download_bond", "view_policy", "flc_cancel"]

    StandardFlowPendingMedical:
      summary: Standard Flow - Medical Required
      value:
        proposal_id: "prop_uuid_medical_001"
        proposal_number: "PLI-MH-2026-00056791"
        issuance_type: "STANDARD"
        status: "PENDING_MEDICAL"
        reason: "Sum assured exceeds non-medical threshold"
        medical_requirement:
          is_required: true
          reason: "SA ≥ 20 Lakh"
          next_steps: "Medical examination will be scheduled"
        workflow_state:
          current_step: "pending_medical"
          next_step: "medical_examination"
          allowed_actions: ["view_status", "cancel"]

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key

security:
  - bearerAuth: []
  - apiKey: []
