          description: Customer ID for aggregate SA check (optional for new customers)
        product_code:
          type: string
        policy_type:
          type: string
          enum: [PLI, RPLI]
        date_of_birth:
          type: string
          format: date
        sum_assured:
          type: number
        policy_term:
          type: integer
        accrued_sum_assured:
          type: number
          description: |
            Accrued Sum Assured for linked products (e.g., Children's Policy linked to parent policy).
            For products with bonus/participating features, this includes accumulated bonuses.
            Used for eligibility validation alongside base sum assured.
        existing_aggregate_sa:
          type: number
          description: Existing aggregate SA from other policies for the customer

    EligibilityCheckResponse:
      type: object
      properties:
        is_eligible:
          type: boolean
        age_at_entry:
          type: integer
        eligibility_checks:
          type: array
          items:
            type: object
            properties:
              check:
                type: string
              passed:
                type: boolean
              message:
                type: string
        aggregate_sa:
          type: object
          properties:
            current:
              type: number
            proposed:
              type: number
            max_allowed:
              type: number
            within_limit:
              type: boolean

    FormatValidationResponse:
      type: object
      properties:
        is_valid:
          type: boolean
        message:
