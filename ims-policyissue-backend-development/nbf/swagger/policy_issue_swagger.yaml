        is_minor:
          type: boolean
          default: false
          description: Whether the nominee is a minor
        appointee_name:
          type: string
          description: Required if is_minor is true
        appointee_relationship:
          type: string
          description: Required if is_minor is true

    ShareValidationResponse:
      type: object
      properties:
        is_valid:
          type: boolean
        total_percentage:
          type: number
        nominee_count:
          type: integer
          description: Number of nominees validated
        message:
          type: string

    DateChainValidationResponse:
      type: object
      properties:
        is_valid:
          type: boolean
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

    AggregateSACheckRequest:
      type: object
      required:
        - customer_id
        - proposed_sa
      properties:
        customer_id:
          type: integer
          format: int64
          description: Customer ID for aggregate SA lookup
        product_code:
          type: string
        policy_type:
          type: string
          enum: [PLI, RPLI]
        proposed_sa:
          type: number

    AggregateSACheckResponse:
      type: object
      properties:
        is_eligible:
          type: boolean
        current_aggregate_sa:
          type: number
        proposed_aggregate_sa:
          type: number
        max_allowed_sa:
          type: number
        reason:
          type: string

