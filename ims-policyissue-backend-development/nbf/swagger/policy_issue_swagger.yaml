  # ============================================
  # WORKFLOW MANAGEMENT APIs (3 APIs)
  # ============================================

  /workflows/{workflow_id}/state:
    get:
      tags:
        - Workflow
      operationId: getWorkflowState
      summary: Get Temporal workflow state
      description: |
        **API ID**: WF-POL-001

        **Components**: WF-PI-001

        Queries Temporal workflow for current state, progress, and pending actions.
      parameters:
        - name: workflow_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Workflow state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowStateResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /workflows/{workflow_id}/signal/{signal_name}:
    post:
      tags:
        - Workflow
      operationId: sendWorkflowSignal
      summary: Send signal to workflow
      description: |
        **API ID**: WF-POL-002

        **Components**: WF-PI-001

        **Available Signals**:
        - qr-decision: QR approval/rejection/return
        - medical-result: Medical outcome callback
        - approver-decision: Final approval/rejection
        - payment-received: Payment confirmation
        - flc-cancel-request: FLC cancellation
        - death-notification: Death during processing
      parameters:
        - name: workflow_id
          in: path
          required: true
          schema:
            type: string
        - name: signal_name
          in: path
          required: true
          schema:
            type: string
            enum:
              - qr-decision
              - medical-result
              - approver-decision
              - payment-received
              - cpc-resubmit
              - flc-cancel-request
              - death-notification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '202':
          description: Signal accepted
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================
  # BULK UPLOAD APIs (2 APIs)
  # ============================================

  /bulk-upload/proposals:
    post:
      tags:
        - Bulk Upload
      operationId: uploadBulkProposals
      summary: Upload bulk proposal file
      description: |
        **User Journeys**: UJ-POL-010

        **Functional Requirements**: FR-POL-021

        **Business Rules**:
        - BR-POL-029: Combined cheque reconciliation

        **Temporal Workflow**: Starts WF-PI-003 (BulkProposalUploadWorkflow)

        **File Formats**: CSV, Excel

        **Max Rows**: 1000 per batch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - file_name
                - mime_type
                - file_size
                - total_rows
                - payment_type
                - uploaded_by
              properties:
                file_name:
                  type: string
                  description: Name of the uploaded file (must end with .csv, .xls, or .xlsx)
                mime_type:
                  type: string
                  description: MIME type of the file
                  enum:
                    - text/csv
                    - application/vnd.ms-excel
                    - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
                file_size:
                  type: integer
                  format: int64
                  description: File size in bytes (max 10 MB)
                  maximum: 10485760
                total_rows:
                  type: integer
                  description: Total number of data rows in the file
                  minimum: 1
                  maximum: 1000
                payment_type:
                  type: string
                  enum:
                    - INDIVIDUAL
                    - COMBINED_CHEQUE
                cheque_amount:
                  type: number
                  description: Required if payment_type is COMBINED_CHEQUE (BR-POL-029)
                uploaded_by:
                  type: integer
                  format: int64
                  description: User ID of the uploader
      responses:
        '202':
          description: Upload accepted for processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkUploadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /bulk-upload/batches/{batch_id}:
    get:
      tags:
        - Bulk Upload
      operationId: getBulkUploadStatus
      summary: Get bulk upload batch status
      description: |
        Retrieves status and results of bulk upload batch.
      parameters:
        - name: batch_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Batch status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkUploadStatusResponse'
        '404':
          $ref: '#/components/responses/NotFound'

# ============================================
# COMPONENTS
# ============================================

components:
  parameters:
    ProposalId:
      name: proposal_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: Unique proposal identifier (bigint) - use /proposals/resolve/{proposal_number} to get ID from number

    ProposalNumber:
      name: proposal_number
      in: path
      required: true
      schema:
        type: string
      description: Human-readable proposal number (e.g., PLI-MH-2026-00056789)

  responses:
    BadRequest:
      description: Bad Request - Validation Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    # ============================================
    # ERROR SCHEMAS
    # ============================================

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - category
            - message
            - http_status
          properties:
            code:
              type: string
              description: Error code (e.g., ERR-POL-001)
              example: "ERR-POL-018"
            category:
              type: string
              enum:
                - VALIDATION_ERROR
                - BUSINESS_RULE_ERROR
                - INTEGRATION_ERROR
                - SYSTEM_ERROR
              example: "VALIDATION_ERROR"
            message:
              type: string
              description: Human-readable error message
              example: "Sum assured must be between Rs. 50,000 and Rs. 10,00,000"
            field:
              type: string
              description: Field that caused the error
              example: "sum_assured"
            http_status:
              type: integer
              example: 400
            details:
              type: object
              additionalProperties: true
              example:
                provided_value: 25000
                min_value: 50000
                max_value: 1000000
                related_rules: ["VR-PI-013", "BR-PI-013"]
            timestamp:
              type: string
              format: date-time
            path:
              type: string
              example: "/api/v1/proposals"
            request_id:
              type: string
              example: "req-abc-123-xyz"
            resolution_steps:
              type: array
              items:
                type: string

    # ============================================
    # QUOTE SCHEMAS
    # ============================================

    ProductListResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        workflow_state:
          $ref: '#/components/schemas/WorkflowState'

    Product:
      type: object
      properties:
        product_code:
          type: string
          example: "PLI_WLA"
        product_name:
          type: string
          example: "Suraksha (Whole Life Assurance)"
        product_type:
          type: string
          enum: [PLI, RPLI]
        min_sum_assured:
          type: number
          example: 20000
        max_sum_assured:
          type: number
          nullable: true
        min_entry_age:
          type: integer
          example: 19
        max_entry_age:
          type: integer
          example: 55
        min_term:
          type: integer
          example: 10
        max_term:
          type: integer
          example: 50
        available_frequencies:
          type: array
          items:
            type: string
            enum: [MONTHLY, QUARTERLY, HALF_YEARLY, YEARLY]
        description:
          type: string

    QuoteCalculateRequest:
      type: object
      required:
        - policy_type
        - product_code
        - proposer
        - coverage
      properties:
        policy_type:
          type: string
          enum: [PLI, RPLI]
        product_code:
          type: string
        proposer:
          type: object
          required:
            - date_of_birth
            - gender
          properties:
            name:
              type: string
            date_of_birth:
              type: string
              format: date
            gender:
              type: string
              enum: [MALE, FEMALE, OTHER]
            mobile:
              type: string
              pattern: '^[0-9]{10}$'
            email:
              type: string
              format: email
        coverage:
          type: object
          required:
            - sum_assured
            - policy_term
            - payment_frequency
          properties:
            sum_assured:
              type: number
              minimum: 20000
            policy_term:
              type: integer
              minimum: 5
              maximum: 50
            payment_frequency:
              type: string
              enum: [MONTHLY, QUARTERLY, HALF_YEARLY, YEARLY]
        location:
          type: object
          properties:
            state:
              type: string
            city:
              type: string

    QuoteCalculateResponse:
      type: object
      properties:
        calculation_id:
          type: string
          format: uuid
        eligibility:
          type: object
          properties:
            is_eligible:
              type: boolean
            age_at_entry:
              type: integer
            maturity_age:
              type: integer
        premium_breakdown:
          $ref: '#/components/schemas/PremiumBreakdown'
        benefit_illustration:
          type: object
          properties:
            maturity_value_guaranteed:
              type: number
            maturity_value_with_bonus:
              type: number
            indicative_bonus_rate:
              type: number
            death_benefit:
              type: number
        calculation_basis:
          type: object
          properties:
            premium_table:
              type: string
            rate_per_thousand:
              type: number
            gst_rate:
              type: number
        workflow_state:
          $ref: '#/components/schemas/WorkflowState'

    PremiumBreakdown:
      type: object
      properties:
        base_premium:
          type: number
        rebate:
          type: number
        net_premium:
          type: number
        cgst:
          type: number
        sgst:
          type: number
        igst:
          type: number
        total_gst:
          type: number
        total_payable:
          type: number

    QuoteCreateRequest:
      type: object
      required:
        - calculation_id
        - policy_type
        - product_code
        - proposer
        - coverage
        - channel
        - created_by
      properties:
        calculation_id:
          type: string
          format: uuid
        policy_type:
          type: string
          enum: [PLI, RPLI]
        product_code:
          type: string
        proposer:
          type: object
          properties:
            name:
              type: string
            date_of_birth:
              type: string
              format: date
            gender:
              type: string
              enum: [MALE, FEMALE, OTHER]
            mobile:
              type: string
            email:
              type: string
              format: email
        coverage:
          type: object
          properties:
            sum_assured:
              type: number
            policy_term:
              type: integer
            payment_frequency:
              type: string
        channel:
          type: string
          enum: [WEB, MOBILE, AGENCY, POS, CSC, DIRECT]
        created_by:
          type: integer
          format: int64
          description: User ID who created the quote
        generate_pdf:
          type: boolean
          default: true
        send_email:
          type: boolean
          default: false

    QuoteCreateResponse:
      type: object
      properties:
        quote_id:
          type: string
          format: uuid
        quote_ref_number:
          type: string
          example: "QT-PLI-2026-00012345"
        status:
          type: string
          enum: [GENERATED, SAVED]
        premium_breakdown:
          $ref: '#/components/schemas/PremiumBreakdown'
        pdf_document:
          type: object
          properties:
            document_id:
              type: string
            download_url:
              type: string
        validity:
          type: object
          properties:
            expires_at:
              type: string
              format: date-time
            days_valid:
              type: integer
        workflow_state:
