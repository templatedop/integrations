paths:
  # ============================================
  # QUOTE APIs (4 APIs)
  # ============================================

  /products:
    get:
      tags:
        - Quote
      operationId: getProducts
      summary: Get available products
      description: |
        Retrieves list of available PLI/RPLI products for quote generation.

        **API ID**: POL-API-001

        **User Journeys**: UJ-POL-001

        **Functional Requirements**: FR-POL-004

        **Integration Points**: INT-POL-001 (Product Catalog Service)
      parameters:
        - name: policy_type
          in: query
          required: false
          schema:
            type: string
            enum: [PLI, RPLI]
          description: Filter by policy type
        - name: is_active
          in: query
          required: false
          schema:
            type: boolean
            default: true
          description: Filter active products only
      responses:
        '200':
          description: Product list retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /quotes/calculate:
    post:
      tags:
        - Quote
      operationId: calculateQuote
      summary: Calculate premium quote
      description: |
        Calculates premium quote based on product, age, sum assured, and term.

        **API ID**: POL-API-002

        **User Journeys**: UJ-POL-001

        **Functional Requirements**: FR-POL-001

        **Business Rules**:
        - BR-POL-001: Base Premium Calculation (Sankalan table lookup)
        - BR-POL-002: GST Calculation (CGST/SGST or IGST based on state)
        - BR-POL-003: Rebate Calculation (mode-based rebates)
        - BR-POL-010: Total Premium Pipeline

        **Validation Rules**:
        - VR-PI-012: Age eligibility (min/max entry age)
        - VR-PI-013: Sum assured range validation
        - VR-PI-044: Policy term range validation

        **Error Codes**:
        - ERR-POL-031: Age not eligible for product
        - ERR-POL-033: Sum assured outside range
        - ERR-POL-036: Invalid policy term
        - ERR-POL-056: Premium calculation failed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuoteCalculateRequest'
      responses:
        '200':
          description: Premium calculated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteCalculateResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ageNotEligible:
                  $ref: '#/components/examples/ERR-POL-031'
                saOutsideRange:
                  $ref: '#/components/examples/ERR-POL-033'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /quotes:
    post:
      tags:
        - Quote
      operationId: createQuote
      summary: Save quote
      description: |
        Saves a calculated quote and generates quote reference number.

        **API ID**: POL-API-003

        **User Journeys**: UJ-POL-001

        **Functional Requirements**: FR-POL-001, FR-POL-002

        **Integration Points**: INT-POL-008 (DMS for PDF storage)

        **Workflow**: Creates lead record for follow-up
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuoteCreateRequest'
      responses:
        '201':
          description: Quote created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /quotes/{quote_id}/convert-to-proposal:
    post:
      tags:
        - Quote
      operationId: convertQuoteToProposal
      summary: Convert quote to proposal
      description: |
        Converts a saved quote to a draft proposal.

        **API ID**: POL-API-004

        **User Journeys**: UJ-POL-001

        **Functional Requirements**: FR-POL-003

        **Business Rules**:
        - BR-POL-024: Deduplication check before conversion

        **Validation Rules**:
        - Quote must be in GENERATED or SAVED status
        - Quote must not be expired

        **Error Codes**:
        - ERR-POL-055: Quote has expired
        - ERR-POL-003: Duplicate customer detected
      parameters:
        - name: quote_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '201':
          description: Proposal created from quote
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteConvertResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Quote already converted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ============================================
  # PROPOSAL CORE APIs (12 APIs)
  # ============================================

  /proposals/indexing:
    post:
      tags:
        - Proposal
      operationId: createProposalIndexing
      summary: Create proposal with indexing
      description: |
        Creates a new proposal through CPC indexing (without Aadhaar).

        **API ID**: POL-API-005

        **User Journeys**: UJ-POL-002

        **Functional Requirements**: FR-POL-007

        **Business Rules**:
        - BR-POL-015: State machine initialization (DRAFT → DATA_ENTRY)
        - BR-POL-018: Date chain validation
        - BR-POL-024: Deduplication check

        **Validation Rules**:
        - VR-PI-004 to VR-PI-007: Date sequence validation
        - VAL-POL-024: Declaration date required
        - VAL-POL-025: Receipt date required

        **Error Codes**:
        - ERR-POL-006: Invalid declaration date
        - ERR-POL-007: Invalid receipt date
        - ERR-POL-008: Invalid indexing date
        - ERR-POL-009: Invalid proposal date

        **Temporal Workflow**: Starts WF-PI-001 (PolicyIssuanceWorkflow)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProposalIndexingRequest'
      responses:
        '201':
          description: Proposal created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposalIndexingResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidDateChain:
                  $ref: '#/components/examples/ERR-POL-006'
        '409':
          description: Duplicate proposal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /proposals/{proposal_id}:
    get:
      tags:
        - Proposal
      operationId: getProposal
      summary: Get proposal details
      description: |
        Retrieves complete proposal details by ID.

        **User Journeys**: UJ-POL-002, UJ-POL-006

        **Functional Requirements**: FR-POL-009
      parameters:
        - $ref: '#/components/parameters/ProposalId'
      responses:
        '200':
          description: Proposal details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposalDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /proposals/resolve/{proposal_number}:
    get:
      tags:
        - Proposal
      operationId: resolveProposalNumber
      summary: Resolve proposal number to ID
      description: |
        Resolves a human-readable proposal_number to proposal_id for subsequent API calls.
        
        **Use Case**: When external systems or UI have proposal_number but need proposal_id for API calls.
        
        **API ID**: POL-API-017
        
        **Response**: Returns minimal proposal info including proposal_id for further operations.
      parameters:
        - $ref: '#/components/parameters/ProposalNumber'
      responses:
        '200':
          description: Proposal resolved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  proposal_id:
                    type: integer
                    format: int64
                  proposal_number:
                    type: string
                  customer_id:
                    type: integer
                    format: int64
                  status:
                    type: string
                  product_code:
                    type: string
                  sum_assured:
                    type: number
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /proposals/{proposal_id}/first-premium:
    post:
      tags:
        - Proposal
      operationId: recordFirstPremium
      summary: Record first premium payment
      description: |
        Records first premium payment at indexing stage.

        **API ID**: POL-API-006

        **User Journeys**: UJ-POL-002

        **Functional Requirements**: FR-POL-026

        **Integration Points**: INT-POL-011 (Collections Service)

        **Business Rules**:
        - Payment modes: CASH, CHEQUE, DD, ONLINE, POSB, NACH

        **Validation Rules**:
        - VR-PI-036: Payment mode validation
        - VR-PI-015: Premium amount validation

        **Error Codes**:
        - ERR-POL-030: Invalid payment mode
        - ERR-POL-058: Payment amount mismatch
      parameters:
        - $ref: '#/components/parameters/ProposalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FirstPremiumRequest'
      responses:
        '200':
          description: First premium recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FirstPremiumResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /proposals/{proposal_id}/sections/insured:
    put:
      tags:
        - Proposal
      operationId: updateInsuredDetails
      summary: Update insured person details
      description: |
        Updates insured person details section of proposal.

        **API ID**: POL-API-007

        **User Journeys**: UJ-POL-002

        **Functional Requirements**: FR-POL-008, FR-POL-034

        **Integration Points**:
        - INT-POL-002: Customer Service (create/link customer)
        - INT-POL-004: PAN verification with NSDL

        **Validation Rules**:
        - VAL-POL-016: Husband name for married female
        - VAL-POL-017: Father name for male/unmarried female
        - VAL-POL-018: Communication address required
        - VAL-POL-019: Permanent address when different
        - VAL-POL-022: City or village required
        - VAL-POL-023: Employment date for PLI
        - VR-PI-010: Aadhaar format validation
        - VR-PI-011: PAN format validation

        **Error Codes**:
        - ERR-POL-010: Invalid Aadhaar number
        - ERR-POL-011: Invalid PAN format
        - ERR-POL-012: PAN required for high premium
        - ERR-POL-015: Father name required
        - ERR-POL-016: Husband name required
      parameters:
        - $ref: '#/components/parameters/ProposalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InsuredDetailsRequest'
      responses:
        '200':
          description: Insured details updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SectionUpdateResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidAadhaar:
                  $ref: '#/components/examples/ERR-POL-010'
                invalidPan:
                  $ref: '#/components/examples/ERR-POL-011'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /proposals/{proposal_id}/sections/nominees:
    put:
      tags:
        - Proposal
      operationId: updateNominees
      summary: Update nominee details
      description: |
        Updates nominee section of proposal. Maximum 3 nominees allowed.

        **API ID**: POL-API-008

        **User Journeys**: UJ-POL-002

        **Functional Requirements**: FR-POL-010

        **Validation Rules**:
        - VAL-POL-003: Nominee shares must total 100%
        - VAL-POL-004: Maximum 3 nominees
        - VAL-POL-005: At least 1 nominee (except HUF/MWPA)
        - VAL-POL-006: Appointee required for minor nominee
        - VR-PI-017: Nominee count validation
        - VR-PI-018: Share percentage validation
        - VR-PI-019: Minor appointee validation

        **Error Codes**:
        - ERR-POL-022: Nominee count exceeded
        - ERR-POL-023: Nominee share invalid
        - ERR-POL-024: Appointee required for minor
      parameters:
        - $ref: '#/components/parameters/ProposalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NomineesRequest'
      responses:
        '200':
          description: Nominees updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SectionUpdateResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                nomineeCountExceeded:
                  $ref: '#/components/examples/ERR-POL-022'
                nomineeShareInvalid:
                  $ref: '#/components/examples/ERR-POL-023'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /proposals/{proposal_id}/sections/policy-details:
    put:
      tags:
        - Proposal
      operationId: updatePolicyDetails
      summary: Update policy details
      description: |
        Updates policy details section including MWPA, HUF, Yugal Suraksha configurations.

        **API ID**: POL-API-009

        **User Journeys**: UJ-POL-002

        **Functional Requirements**: FR-POL-011, FR-POL-012, FR-POL-013, FR-POL-014

        **Validation Rules**:
        - VAL-POL-007: Spouse required for Yugal Suraksha
        - VAL-POL-010: SA decrease restriction for certain products
        - VAL-POL-026: Policy taken under required
        - VR-PI-020: Max 7 HUF members

        **Error Codes**:
        - ERR-POL-017: Spouse details required
        - ERR-POL-025: HUF member count exceeded
        - ERR-POL-034: SA not multiple of 5000
        - ERR-POL-036: Invalid policy term
      parameters:
        - $ref: '#/components/parameters/ProposalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyDetailsRequest'
      responses:
        '200':
          description: Policy details updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SectionUpdateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /proposals/{proposal_id}/sections/agent:
    put:
      tags:
        - Proposal
      operationId: updateAgentDetails
      summary: Update agent association
      description: |
        Links an agent to the proposal and captures snapshot of agent details.

        **API ID**: POL-API-010

        **User Journeys**: UJ-POL-002

        **Functional Requirements**: FR-POL-016

        **Integration Points**: INT-POL-014 (Agent Service)

        **Business Rules**:
        - Agent must be active and licensed
        - Agent details snapshotted at proposal time
      parameters:
        - $ref: '#/components/parameters/ProposalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentDetailsRequest'
      responses:
        '200':
          description: Agent linked successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SectionUpdateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /proposals/{proposal_id}/sections/medical:
    put:
      tags:
        - Proposal
      operationId: updateMedicalInfo
      summary: Update medical questionnaire
      description: |
        Updates medical questionnaire responses.

        **API ID**: POL-API-011

        **User Journeys**: UJ-POL-002, UJ-POL-005

        **Functional Requirements**: FR-POL-017, FR-POL-018

        **Business Rules**:
        - BR-POL-013: Medical requirement determination (SA ≥ 20 Lakh)

        **Validation Rules**:
        - Enhanced medical required for SA ≥ 20 Lakh
        - Disease details required if any disease flag is true

        **Error Codes**:
        - ERR-POL-037: Medical examination required
        - ERR-POL-038: Medical report pending
      parameters:
        - $ref: '#/components/parameters/ProposalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MedicalInfoRequest'
      responses:
        '200':
          description: Medical info updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SectionUpdateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /proposals/{proposal_id}/submit-for-qc:
    post:
      tags:
        - Proposal
      operationId: submitForQC
      summary: Submit proposal for quality review
      description: |
        Submits completed proposal for quality review.

        **API ID**: POL-API-012

        **User Journeys**: UJ-POL-002

        **Functional Requirements**: FR-POL-022

        **Business Rules**:
        - BR-POL-015: State transition DATA_ENTRY → QC_PENDING

        **Validation Rules**:
        - All mandatory sections must be complete
        - All mandatory documents must be uploaded

        **Error Codes**:
        - ERR-POL-029: Mandatory document missing
        - ERR-POL-050: Incomplete proposal

        **Temporal Workflow**: Sends signal to WF-PI-001
      parameters:
        - $ref: '#/components/parameters/ProposalId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                comments:
                  type: string
                  description: Submission comments
      responses:
        '200':
          description: Proposal submitted for QC
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitForQCResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /proposals/{proposal_id}/summary:
    get:
      tags:
        - Proposal
      operationId: getProposalSummary
      summary: Get proposal summary for review
      description: |
        Retrieves comprehensive proposal summary for QR/Approver review.

        **API ID**: POL-API-016

        **User Journeys**: UJ-POL-006

        **Functional Requirements**: FR-POL-033

        **Business Rules**:
        - BR-POL-016: Determines required approval level based on SA
        - BR-POL-025: Age revalidation at approval time

        **Response includes**:
        - Insured and coverage details
        - Nominee summary
        - Medical status
        - Agent information
        - Document checklist
        - Approval routing info
        - Age change detection
      parameters:
        - $ref: '#/components/parameters/ProposalId'
      responses:
        '200':
          description: Proposal summary retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposalSummaryResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /proposals/queue:
    get:
      tags:
        - Proposal
      operationId: getProposalQueue
      summary: Get proposals in queue
      description: |
        Retrieves proposals in specified queue for QR/Approver workload.

        **API ID**: WF-POL-003

        **User Journeys**: UJ-POL-006

        **Functional Requirements**: FR-POL-009

        **Query Parameters**:
        - status: Filter by proposal status
        - level: Approver level filter
        - po_code: Post office filter
        - assigned_to: User assignment filter
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - QC_PENDING
              - QC_RETURNED
              - APPROVAL_PENDING
              - PENDING_MEDICAL
          description: Filter by status
        - name: level
          in: query
          required: false
          schema:
            type: integer
            enum: [1, 2, 3]
          description: Approver level
        - name: po_code
          in: query
          required: false
          schema:
            type: string
          description: Post office code
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Queue retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposalQueueResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ============================================
  # AADHAAR FLOW APIs (3 APIs)
  # ============================================

  /proposals/aadhaar/initiate:
    post:
      tags:
        - Aadhaar Flow
      operationId: initiateAadhaarAuth
      summary: Initiate Aadhaar authentication
      description: |
        Initiates Aadhaar OTP authentication for proposal creation.

        **API ID**: POL-API-013

        **User Journeys**: UJ-POL-003

        **Functional Requirements**: FR-POL-020

        **Integration Points**:
        - INT-POL-003: Customer Service eKYC
        - INT-POL-005: UIDAI OTP service

        **Business Rules**:
        - Aadhaar must be 12 digits
        - OTP valid for 10 minutes

        **Error Codes**:
        - ERR-POL-010: Invalid Aadhaar number
        - ERR-POL-061: Aadhaar service unavailable
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AadhaarInitiateRequest'
      responses:
        '200':
          description: OTP sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AadhaarInitiateResponse'
        '400':
          description: Invalid Aadhaar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidAadhaar:
                  $ref: '#/components/examples/ERR-POL-010'
        '502':
          description: Aadhaar service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /proposals/aadhaar/verify-otp:
    post:
      tags:
        - Aadhaar Flow
      operationId: verifyAadhaarOtp
      summary: Verify Aadhaar OTP
      description: |
        Verifies OTP and retrieves demographic data from UIDAI.

        **API ID**: POL-API-014

        **User Journeys**: UJ-POL-003

        **Functional Requirements**: FR-POL-020

        **Integration Points**:
        - INT-POL-005: UIDAI verification
        - INT-POL-008: DMS for Aadhaar photo storage

        **Response includes**:
        - Customer demographic data (name, DOB, gender, address)
        - Photo from UIDAI (stored in DMS)
        - Session ID for proposal submission

        **Error Codes**:
        - ERR-POL-062: Invalid OTP
        - ERR-POL-063: OTP expired
        - ERR-POL-064: Max retries exceeded
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AadhaarVerifyOtpRequest'
      responses:
        '200':
          description: OTP verified, data retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AadhaarVerifyOtpResponse'
        '400':
          description: Verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /proposals/aadhaar/submit:
    post:
      tags:
        - Aadhaar Flow
      operationId: submitAadhaarProposal
      summary: Submit Aadhaar-based proposal
      description: |
        Submits complete proposal with Aadhaar-authenticated data.
        Supports instant issuance for non-medical cases.

        **API ID**: POL-API-015

        **User Journeys**: UJ-POL-003

        **Functional Requirements**: FR-POL-020, FR-POL-030

        **Business Rules**:
        - BR-POL-013: Medical requirement check
        - BR-POL-015: Accelerated state machine for instant issuance

        **Instant Issuance Criteria**:
        - Age ≤ 50 years
        - SA within non-medical limit (< 20 Lakh)
        - No adverse medical history
        - Payment completed

        **Temporal Workflow**:
        - WF-PI-002 (InstantIssuanceWorkflow) if eligible
        - WF-PI-001 (PolicyIssuanceWorkflow) otherwise

        **Error Codes**:
        - ERR-POL-048: Not eligible for instant issuance
        - ERR-POL-037: Medical examination required
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AadhaarSubmitRequest'
      responses:
        '200':
          description: Proposal submitted
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/InstantIssuanceResponse'
                  - $ref: '#/components/schemas/StandardIssuanceResponse'
              examples:
                instantIssuance:
                  $ref: '#/components/examples/InstantIssuanceSuccess'
                standardFlow:
                  $ref: '#/components/examples/StandardFlowPendingMedical'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ============================================
  # APPROVAL WORKFLOW APIs (5 APIs)
  # ============================================

  /proposals/{proposal_id}/qr-approve:
    post:
      tags:
        - Approval
      operationId: qrApproveProposal
      summary: QR approves proposal
      description: |
        Quality Reviewer approves proposal for next stage.

        **API ID**: POL-API-017

        **User Journeys**: UJ-POL-006

        **Functional Requirements**: FR-POL-022

        **Business Rules**:
        - BR-POL-015: State transition QC_PENDING → QC_APPROVED
        - BR-POL-016: Routes to appropriate approver level based on SA

        **State Transitions**:
        - If medical required: QC_APPROVED → PENDING_MEDICAL
        - If no medical: QC_APPROVED → APPROVAL_PENDING

        **Temporal Workflow**: Sends SignalQRDecision with APPROVED
      parameters:
        - $ref: '#/components/parameters/ProposalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QRDecisionRequest'
      responses:
        '200':
          description: QR approval recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QRApprovalResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Invalid state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /proposals/{proposal_id}/qr-reject:
    post:
      tags:
        - Approval
      operationId: qrRejectProposal
      summary: QR rejects proposal
      description: |
        Quality Reviewer rejects proposal with mandatory comments.

        **API ID**: POL-API-018

        **User Journeys**: UJ-POL-006

        **Functional Requirements**: FR-POL-022

        **Business Rules**:
        - BR-POL-015: State transition QC_PENDING → QC_REJECTED
        - BR-POL-017: Rejection requires comments

        **Validation Rules**:
        - VAL-POL-013: Comments mandatory for rejection

        **Error Codes**:
        - ERR-POL-054: Rejection details

        **Temporal Workflow**: Sends SignalQRDecision with REJECTED
      parameters:
        - $ref: '#/components/parameters/ProposalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QRRejectRequest'
      responses:
        '200':
          description: QR rejection recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QRRejectionResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /proposals/{proposal_id}/qr-return:
    post:
      tags:
        - Approval
      operationId: qrReturnProposal
      summary: QR returns proposal for corrections
      description: |
        Quality Reviewer returns proposal to CPC for corrections.

        **API ID**: POL-API-019

        **User Journeys**: UJ-POL-006

        **Functional Requirements**: FR-POL-022

        **Business Rules**:
        - BR-POL-015: State transition QC_PENDING → QC_RETURNED

        **Workflow**:
        - CPC can make corrections
        - CPC resubmits via submit-for-qc endpoint
        - Proposal returns to QC_PENDING

        **Temporal Workflow**: Sends SignalQRDecision with RETURNED
      parameters:
        - $ref: '#/components/parameters/ProposalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QRReturnRequest'
      responses:
        '200':
          description: Proposal returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QRReturnResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /proposals/{proposal_id}/approve:
    post:
      tags:
        - Approval
      operationId: approveProposal
      summary: Approver approves proposal
      description: |
        Final approver (L1/L2/L3) approves proposal for policy issuance.

        **API ID**: POL-API-020

        **User Journeys**: UJ-POL-006

        **Functional Requirements**: FR-POL-022, FR-POL-023

        **Business Rules**:
        - BR-POL-015: State transition APPROVAL_PENDING → APPROVED
        - BR-POL-025: Age revalidation at approval
        - Policy number generated upon approval

        **Approval Hierarchy (BR-POL-016)**:
        - Level 1: SA ≤ 5,00,000
        - Level 2: SA ≤ 10,00,000
        - Level 3: SA > 10,00,000

        **Error Codes**:
        - ERR-POL-049: Incorrect approver level
        - ERR-POL-050: Quality review pending

        **Temporal Workflow**: Sends SignalApproverDecision with APPROVED

        **Events Published**: proposal.approved
      parameters:
        - $ref: '#/components/parameters/ProposalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproverDecisionRequest'
      responses:
        '200':
          description: Proposal approved, policy number assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Approver level mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                incorrectLevel:
                  $ref: '#/components/examples/ERR-POL-049'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /proposals/{proposal_id}/reject:
    post:
      tags:
        - Approval
      operationId: rejectProposal
      summary: Approver rejects proposal
      description: |
        Final approver rejects proposal with mandatory reason.

        **API ID**: POL-API-021

        **User Journeys**: UJ-POL-006

        **Functional Requirements**: FR-POL-022

        **Business Rules**:
        - BR-POL-015: State transition APPROVAL_PENDING → REJECTED
        - BR-POL-017: Rejection requires comments

        **Actions Triggered**:
        - Premium refund initiated
        - Customer notification sent

        **Temporal Workflow**: Sends SignalApproverDecision with REJECTED

        **Events Published**: proposal.rejected
      parameters:
        - $ref: '#/components/parameters/ProposalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproverRejectRequest'
      responses:
        '200':
          description: Proposal rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RejectionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

