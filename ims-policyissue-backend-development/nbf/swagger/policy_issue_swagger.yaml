openapi: 3.0.3
info:
  title: Policy Issue Management Service API
  description: |
    # Policy Issue Management Service - OpenAPI Specification

    Complete API specification for the **Insurance Management System (IMS) PLI 2.0** - Policy Issue Management Module.

    This module handles the complete lifecycle of new business policy issuance for PLI (Postal Life Insurance)
    and RPLI (Rural Postal Life Insurance), including:

    - Quote Generation & Benefit Illustration
    - Proposal Creation (With and Without Aadhaar)
    - KYC & Compliance Verification
    - Medical Underwriting Orchestration
    - Multi-Level Approval Workflow
    - Policy Number Generation & Bond Creation
    - Free Look Period Management
    - Bulk Upload Processing

    ---

    ## API Summary by Category

    | Category | Count | Description |
    |----------|-------|-------------|
    | **Quote APIs** | 4 | Quote generation, calculation, conversion |
    | **Proposal Core APIs** | 12 | Proposal creation, indexing, section updates |
    | **Aadhaar Flow APIs** | 3 | Aadhaar authentication and instant issuance |
    | **Approval Workflow APIs** | 5 | QR review, approver decisions |
    | **Policy Lifecycle APIs** | 3 | Policy issuance, FLC cancellation |
    | **Lookup APIs** | 10 | Reference data dropdowns |
    | **Validation APIs** | 8 | Pre-validation checks |
    | **Calculation APIs** | 4 | Premium, GST, FLC refund |
    | **Document APIs** | 4 | Document upload/download |
    | **Status & Tracking APIs** | 4 | Status, timeline queries |
    | **Workflow Management APIs** | 3 | Temporal workflow operations |
    | **Bulk Upload APIs** | 2 | Batch processing |
    | **Total APIs** | **62** | |

    ---

    ## Business Rules Reference

    - **BR-POL-001 to BR-POL-010**: Calculation Rules (Premium, GST, Rebate, FLC Refund)
    - **BR-POL-011 to BR-POL-013**: Eligibility Rules (PLI, RPLI, Medical)
    - **BR-POL-015 to BR-POL-017**: State Transition & Approval Routing
    - **BR-POL-018 to BR-POL-021**: Time-Based Rules (Date Chain, FLC Period)
    - **BR-POL-024 to BR-POL-032**: Validation & Edge Cases

    ## Validation Rules Reference

    - **VR-PI-001 to VR-PI-044**: Field validations, format checks, business constraints

    ## Error Code Categories

    - **ERR-POL-001 to ERR-POL-030**: Validation Errors (HTTP 400)
    - **ERR-POL-031 to ERR-POL-060**: Business Rule Errors (HTTP 400)
    - **ERR-POL-061 to ERR-POL-080**: Integration Errors (HTTP 502/503/504)
    - **ERR-POL-081 to ERR-POL-099**: System Errors (HTTP 500)

    ## Temporal Workflows

    - **WF-PI-001**: PolicyIssuanceWorkflow (Standard flow)
    - **WF-PI-002**: InstantIssuanceWorkflow (Aadhaar non-medical)
    - **WF-PI-003**: BulkProposalUploadWorkflow (Batch processing)

  version: 1.0.0
  contact:
    name: IMS PLI 2.0 API Team
    email: api-support@pli.gov.in
  license:
