          type: number
        medical_fee_deduction:
          type: number
        total_deductions:
          type: number
        net_refund_amount:
          type: number

    GSTCalculationRequest:
      type: object
      required:
        - base_amount
        - insured_state
      properties:
        base_amount:
          type: number
