  - name: Approval
    description: |
      Quality review and approval workflow APIs.
      **Count: 5 APIs**
  - name: Policy
    description: |
      Policy lifecycle management APIs.
      **Count: 3 APIs**
  - name: Lookup
    description: |
      Reference data and dropdown APIs.
      **Count: 10 APIs**
  - name: Validation
    description: |
      Pre-validation and eligibility check APIs.
      **Count: 8 APIs**
  - name: Calculation
    description: |
      Premium, GST, and refund calculation APIs.
      **Count: 4 APIs**
  - name: Document
    description: |
      Document management APIs.
      **Count: 4 APIs**
  - name: Status
    description: |
      Status tracking and timeline APIs.
      **Count: 4 APIs**
  - name: Workflow
