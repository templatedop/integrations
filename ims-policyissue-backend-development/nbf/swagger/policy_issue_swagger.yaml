        - Document
      operationId: getRequiredDocuments
      summary: Get dynamic document checklist
      description: |
        **API ID**: DOC-POL-001

        **Components**: FR-POL-029

        Returns list of required documents based on product, SA, age, and other criteria.
      parameters:
        - $ref: '#/components/parameters/ProposalId'
      responses:
        '200':
          description: Document checklist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentChecklistResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /proposals/{proposal_id}/documents:
    post:
      tags:
        - Document
      operationId: uploadDocument
      summary: Upload document
      description: |
        **API ID**: DOC-POL-002

        **Integration Points**: INT-POL-008 (DMS)

        **Validation Rules**:
        - VR-PI-021: File type (PDF, JPG, PNG, JPEG only)
        - VR-PI-022: File size (max 5 MB)
        - VR-PI-023: Document date not in future

        **Error Codes**:
        - ERR-POL-026: Invalid file type
        - ERR-POL-027: File size exceeds limit
        - ERR-POL-028: Invalid document date
      parameters:
        - $ref: '#/components/parameters/ProposalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentUploadRequest'
      responses:
        '201':
          description: Document uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentUploadResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: File too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /proposals/{proposal_id}/documents/{document_id}:
    get:
      tags:
        - Document
      operationId: downloadDocument
      summary: Get document metadata
      description: |
        **API ID**: DOC-POL-003

        **Integration Points**: INT-POL-008 (DMS)

        Returns document metadata and download URL. In production, actual file
        content is served via DMS proxy/redirect.
      parameters:
        - $ref: '#/components/parameters/ProposalId'
        - name: document_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            description: Document reference ID (bigint)
      responses:
        '200':
          description: Document metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentUploadResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Document
      operationId: removeDocument
      summary: Remove document
      description: |
        **API ID**: DOC-POL-004

        **Integration Points**: INT-POL-008 (DMS)

        Soft-deletes document from proposal. Requires maker-checker for certain document types.
      parameters:
        - $ref: '#/components/parameters/ProposalId'
        - name: document_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            description: Document reference ID (bigint)
      responses:
        '204':
          description: Document removed
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          description: Deletion not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /proposals/{proposal_id}/missing-documents:
    get:
      tags:
        - Document
      operationId: getMissingDocuments
      summary: Get list of missing documents
      description: |
        Get all missing documents recorded for a proposal during QC/Approval review stages.

        **API ID**: DOC-POL-005

        **Business Rules**:
        - Returns documents marked as missing during QC_REVIEW or APPROVAL stage
        - Includes resolution status (PENDING, UPLOADED, WAIVED)
      parameters:
        - $ref: '#/components/parameters/ProposalId'
        - name: stage
          in: query
          description: Filter by stage where missing was noted
          schema:
            type: string
            enum: [QC_REVIEW, APPROVAL]
        - name: status
          in: query
          description: Filter by resolution status
          schema:
            type: string
            enum: [PENDING, UPLOADED, WAIVED]
      responses:
        '200':
          description: Missing documents list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MissingDocumentsListResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags:
        - Document
      operationId: addMissingDocument
      summary: Record a missing document
      description: |
        Record a document as missing during QC/Approval review.

        **API ID**: DOC-POL-006

        **Business Rules**:
        - Can only be added during QC_REVIEW or APPROVAL stage
        - Used to track documents that need follow-up
      parameters:
        - $ref: '#/components/parameters/ProposalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MissingDocumentCreateRequest'
      responses:
        '201':
          description: Missing document recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentMissingNotation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /proposals/{proposal_id}/missing-documents/{missing_doc_id}/resolve:
    put:
      tags:
        - Document
      operationId: resolveMissingDocument
      summary: Resolve a missing document
      description: |
        Mark a missing document as resolved (uploaded or waived).

        **API ID**: DOC-POL-007

        **Business Rules**:
        - Status can be set to UPLOADED (with document reference) or WAIVED (with reason)
        - Waivers may require additional authorization
      parameters:
        - $ref: '#/components/parameters/ProposalId'
        - name: missing_doc_id
          in: path
          required: true
          description: Missing document record ID
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MissingDocumentResolveRequest'
      responses:
        '200':
          description: Missing document resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentMissingNotation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

