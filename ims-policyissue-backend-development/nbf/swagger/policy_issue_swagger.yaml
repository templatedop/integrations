        policy_number:
          type: string
        proposal_id:
          type: integer
          format: int64
          description: Linked proposal identifier
        customer_id:
          type: integer
          format: int64
          description: Customer ID linked to this policy
        status:
          type: string
        policy_type:
          type: string
        product_code:
          type: string
        product_name:
          type: string
        customer:
          type: object
          additionalProperties: true
        coverage:
          type: object
          additionalProperties: true
        premium:
          $ref: '#/components/schemas/PremiumBreakdown'
        dates:
          type: object
          properties:
            issue_date:
              type: string
              format: date
            commencement_date:
              type: string
              format: date
            maturity_date:
              type: string
              format: date
        dispatch_delivery:
          type: object
          description: Policy kit dispatch and delivery tracking
          properties:
            dispatch_date:
              type: string
              format: date
              description: Date when policy kit was dispatched
            delivery_date:
              type: string
              format: date
              description: Actual date of delivery to customer - used for FLC start and Collections
            delivery_status:
              type: string
              enum: [PENDING_DISPATCH, DISPATCHED, IN_TRANSIT, DELIVERED, DELIVERY_FAILED]
            delivery_confirmation_mode:
              type: string
              enum: [POSTAL_TRACKING, CUSTOMER_ACKNOWLEDGEMENT, DIGITAL_DELIVERY]
