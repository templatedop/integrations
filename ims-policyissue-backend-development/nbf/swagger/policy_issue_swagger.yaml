  # VALIDATION APIs (8 APIs)
  # ============================================

  /validate/eligibility:
    post:
      tags:
        - Validation
      operationId: validateEligibility
      summary: Real-time eligibility check
      description: |
        **API ID**: VAL-POL-001

        **Components**: BR-POL-011, BR-POL-012

        Validates customer eligibility for product including age, SA limits,
        aggregate SA check.

        **Integration Points**: INT-POL-002 (Customer Service for aggregate SA)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EligibilityCheckRequest'
      responses:
        '200':
          description: Eligibility result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EligibilityCheckResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /validate/aadhaar-format:
    post:
      tags:
        - Validation
      operationId: validateAadhaarFormat
      summary: Validate Aadhaar format
      description: |
        **API ID**: VAL-POL-002

        **Components**: VR-PI-008

        Validates Aadhaar number format (12 digits).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - aadhaar_number
              properties:
                aadhaar_number:
                  type: string
                  pattern: '^[0-9]{12}$'
      responses:
        '200':
          description: Format validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormatValidationResponse'

  /validate/pan-format:
    post:
      tags:
        - Validation
      operationId: validatePanFormat
      summary: Validate PAN format
      description: |
        **API ID**: VAL-POL-003

        **Components**: VR-PI-009

        Validates PAN format (AAAAA9999A).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - pan_number
              properties:
                pan_number:
                  type: string
                  pattern: '^[A-Z]{5}[0-9]{4}[A-Z]{1}$'
      responses:
        '200':
          description: Format validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormatValidationResponse'

  /validate/pincode:
    post:
      tags:
        - Validation
      operationId: validatePincode
      summary: Validate pincode-state combination
      description: |
        **API ID**: VAL-POL-004

        **Components**: VR-PI-034, VR-PI-035

        Validates 6-digit pincode and state match.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - pincode
              properties:
                pincode:
                  type: string
                  pattern: '^[0-9]{6}$'
                state:
                  type: string
      responses:
        '200':
          description: Pincode validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PincodeValidationResponse'

  /validate/bank-ifsc:
    post:
      tags:
        - Validation
      operationId: validateBankIfsc
      summary: Validate IFSC code
      description: |
        **API ID**: VAL-POL-005

        **Components**: VR-PI-030

        Validates 11-character IFSC code format and optionally verifies with bank directory.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ifsc_code
              properties:
                ifsc_code:
                  type: string
                  pattern: '^[A-Z]{4}0[A-Z0-9]{6}$'
      responses:
        '200':
          description: IFSC validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IFSCValidationResponse'

  /validate/nominee-shares:
    post:
      tags:
        - Validation
      operationId: validateNomineeShares
      summary: Validate nominee share percentages
      description: |
        **API ID**: VAL-POL-006

        **Components**: VR-PI-018

        Validates that nominee shares total exactly 100%.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                shares:
                  type: array
                  description: Simple share-only validation (backward compatible). Use nominees for richer validation.
                  items:
                    type: number
                    minimum: 0
                    maximum: 100
                nominees:
                  type: array
                  description: Rich nominee entries with share, minor/appointee validation. Max 3 nominees.
                  items:
                    $ref: '#/components/schemas/NomineeShareEntry'
      responses:
        '200':
          description: Share validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareValidationResponse'

  /validate/date-chain:
    post:
      tags:
        - Validation
      operationId: validateDateChain
      summary: Validate proposal date sequence
      description: |
        **API ID**: VAL-POL-007

        **Components**: BR-POL-018

        Validates date chain: declaration_date ≤ receipt_date ≤ indexing_date ≤ proposal_date
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - declaration_date
                - receipt_date
                - indexing_date
                - proposal_date
              properties:
                declaration_date:
                  type: string
                  format: date
                receipt_date:
                  type: string
                  format: date
                indexing_date:
                  type: string
                  format: date
                proposal_date:
                  type: string
                  format: date
      responses:
        '200':
          description: Date chain validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DateChainValidationResponse'

  /validate/aggregate-sa:
    post:
      tags:
        - Validation
      operationId: validateAggregateSA
      summary: Check aggregate sum assured
      description: |
        **API ID**: VAL-POL-008

        **Components**: INT-POL-002

        **Integration Points**: Customer Service (Portfolio check)

        Checks if proposed SA + existing SA exceeds aggregate limits.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AggregateSACheckRequest'
      responses:
        '200':
          description: Aggregate SA check result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AggregateSACheckResponse'

