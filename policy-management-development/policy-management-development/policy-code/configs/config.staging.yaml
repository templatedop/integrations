# Staging environment overrides
appname: "policy-management-staging"

db:
  username: "${DB_USER}"
  password: "${DB_PASSWORD}"
  host: "${DB_HOST}"
  port: "5432"
  database: "ims_pli_staging"
  schema: "policy_mgmt"
  maxconns: 30
  minconns: 5

temporal:
  hostport: "${TEMPORAL_HOST}"
  namespace: "pli-insurance"
  taskqueue: "policy-management-tq"

trace:
  enabled: true

cors:       
    alloworigins:
      - "http://localhost:3000"
      - "http://localhost:8080"        
    allowheaders:
      - "Authorization"
      - "Content-Type"
      - "X-Request-Id"
    allowmethods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS" 