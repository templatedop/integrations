info:  ## This is the information that will be displayed in the swagger
  name: "go-training"
  version: "1.0.0"
  description: "test service"
  title: "go-training"
  terms: "https://example.com/terms"
  email: "test@gmail.com" ## This is the email address to contact the API maintainer and this reflects in swagger
metrics:
  expose: false   #metrics enable/disable.
  buckets: 
  collect: 
    build: false
    go: false
    process: false  
    routes: true
server: 
  debug:
    stats:
      expose: true #stats enable/disable
      path: "/debug/statsviz"
    pprof:
      expose: true #pprof enable/disable
      path: "/debug/pprof"
  dashboard:
    Enabled: true #dashboard enable/disable
  healthcheck:
    expose: true     #healthcheck enable/disable
    path: "/healthzz"   
  bodylimit: 2097152
  readbuffersize: 16384
  addr: ":8080"
  readtimeout: 10s
  writetimeout: 60s
  timeout: 40 ## Over all timeout for the request  
  cors:       
    alloworigins:
      - "http://localhost:3000"
      - "http://localhost:8080"        
    allowheaders:
      - "Authorization"
      - "Content-Type"
      - "X-Request-Id"
    allowmethods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"  
log:
  level: "debug"
  format: "json"
  output: "stdout"
