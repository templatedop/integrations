appname: "surrender"
trace:
  enabled: false #trace enable/disable
  processor: 
    type: "otlp-grpc"
    options:
      host: "localhost:4317"
  sampler:
    type: always-on
    # type: parent-based-trace-id-ratio
    options: 
      ratio: 0.1
swagger:
  generation:
    mode: "build"

db: 

